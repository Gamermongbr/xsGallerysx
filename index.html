<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xsLocksx</title>
    <link rel="stylesheet" href="/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lobster&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06b6d4" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          console.log('[Main] Attempting to register Service Worker...');
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Main] SW Registered successfully!', reg.scope))
            .catch(err => console.error('[Main] SW Registration failed!', err));
        });
      } else {
        console.warn('[Main] serviceWorker not supported in this browser.');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
